{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><span class="navicon"></span></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist {% if page.url == '/' or page.url == '/index.html' %}selected{% endif %}">
            <span class="site-title" style="margin-right: 160px;">{{ site.title }}</span>
          </li>
          {% for link in site.data.navigation.main %}
  <li class="masthead__menu-item {% if page.url == link.url %}selected{% endif %}">
    {% if link.title == "News" %}
      <a href="/talks/">{{ link.title }}</a>
    {% else %}
      <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
    {% endif %}
  </li>
{% endfor %}
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button" aria-labelledby="theme-icon"><i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i></a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
